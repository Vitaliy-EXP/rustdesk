name: Flutter Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: 'Upload build artifacts'
        required: false
        default: false
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            arch: x64
          - os: macos-latest
            target: macos
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        run: |
          cd flutter
          flutter pub get
          flutter build ${{ matrix.target }} --release

      - name: Upload artifacts
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-${{ matrix.target }}-${{ matrix.arch }}
          path: flutter/build/${{ matrix.target }}/**/*
